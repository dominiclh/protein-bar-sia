<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="refresh" content="14400" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #fff; }
    body {
      font-family: 'DM Sans', 'Helvetica Neue', sans-serif;
      display: flex;
      flex-direction: column;
      padding: 12px 14px 8px;
      -webkit-font-smoothing: antialiased;
    }
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 7px;
      flex-shrink: 0;
    }
    .chart-title {
      font-size: 10.5px;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: #0a4635;
    }
    .legend {
      display: flex;
      gap: 7px;
      flex-wrap: wrap;
      align-items: center;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 3px;
      font-size: 9.5px;
      font-weight: 600;
      color: #666;
    }
    .legend-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .chart-wrap {
      flex: 1;
      position: relative;
      min-height: 0;
    }
  </style>
</head>
<body>

  <div class="top-bar">
    <span class="chart-title">Value vs Content</span>
    <div class="legend" id="legend"></div>
  </div>
  <div class="chart-wrap">
    <canvas id="scatter"></canvas>
  </div>

  <script src="/bars-data.js"></script>
  <script>
    ALL_BARS.forEach(b => {
      b.ppg            = parseFloat((b.priceBar / b.protein).toFixed(4));
      b.proteinDensity = parseFloat((b.protein  / b.calories * 100).toFixed(3));
    });

    document.getElementById('legend').innerHTML = Object.entries(BRANDS).map(
      ([name, {color}]) =>
        `<div class="legend-item">
          <div class="legend-dot" style="background:${color}"></div>
          <span>${name}</span>
        </div>`
    ).join('');

    const quadrantPlugin = {
      id: 'quadrantBg',
      beforeDraw(chart) {
        const { ctx, chartArea, scales } = chart;
        if (!chartArea) return;
        const { left, top, right, bottom } = chartArea;
        let allX = [], allY = [];
        chart.data.datasets.forEach(ds => ds.data.forEach(pt => { allX.push(pt.x); allY.push(pt.y); }));
        if (!allX.length) return;
        allX.sort((a,b) => a-b); allY.sort((a,b) => a-b);
        const medX = allX[Math.floor(allX.length / 2)];
        const medY = allY[Math.floor(allY.length / 2)];
        const midPxX = scales.x.getPixelForValue(medX);
        const midPxY = scales.y.getPixelForValue(medY);
        ctx.save();
        ctx.fillStyle = 'rgba(39,174,96,0.07)';
        ctx.fillRect(left, top, midPxX - left, midPxY - top);
        ctx.fillStyle = 'rgba(255,198,45,0.07)';
        ctx.fillRect(midPxX, top, right - midPxX, midPxY - top);
        ctx.strokeStyle = 'rgba(0,0,0,0.07)';
        ctx.lineWidth = 1;
        ctx.setLineDash([3, 3]);
        ctx.beginPath(); ctx.moveTo(midPxX, top); ctx.lineTo(midPxX, bottom); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(left, midPxY); ctx.lineTo(right, midPxY); ctx.stroke();
        ctx.setLineDash([]);
        ctx.font = '600 9px sans-serif';
        ctx.fillStyle = 'rgba(39,174,96,0.50)';
        ctx.fillText('BEST VALUE', left + 5, top + 11);
        ctx.fillStyle = 'rgba(200,160,0,0.40)';
        ctx.fillText('PREMIUM', midPxX + 5, top + 11);
        ctx.restore();
      }
    };

    new Chart(document.getElementById('scatter').getContext('2d'), {
      type: 'scatter',
      plugins: [quadrantPlugin],
      data: {
        datasets: Object.entries(BRANDS).map(([brand, {color}]) => ({
          label: brand,
          data: ALL_BARS.filter(b => b.brand === brand).map(b => ({ x: b.ppg, y: b.proteinDensity, _bar: b })),
          backgroundColor: color + 'cc',
          borderColor: color,
          borderWidth: 1.5,
          pointRadius: 6,
          pointHoverRadius: 9,
          pointHoverBorderColor: '#fff',
          pointHoverBorderWidth: 1.5,
        }))
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        animation: { duration: 300, easing: 'easeOutQuart' },
        layout: { padding: { left: 4, right: 4, top: 4, bottom: 2 } },
        scales: {
          x: {
            title: { display: true, text: '$ / g protein', font: { size: 10, family: "'DM Sans', sans-serif" }, color: '#aaa', padding: { top: 2 } },
            ticks: { font: { size: 9, family: "'DM Sans', sans-serif" }, color: '#aaa', callback: v => '$' + v.toFixed(3), maxTicksLimit: 6 },
            grid: { color: '#f0efeb' },
            border: { display: false },
          },
          y: {
            title: { display: true, text: 'g / 100 kcal', font: { size: 10, family: "'DM Sans', sans-serif" }, color: '#aaa', padding: { bottom: 2 } },
            ticks: { font: { size: 9, family: "'DM Sans', sans-serif" }, color: '#aaa', callback: v => v.toFixed(1), maxTicksLimit: 6 },
            grid: { color: '#f0efeb' },
            border: { display: false },
          },
        },
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: '#0a4635',
            titleFont: { family: "'DM Sans', sans-serif", size: 11, weight: '700' },
            bodyFont:  { family: "'DM Sans', sans-serif", size: 10 },
            padding: 8,
            cornerRadius: 6,
            displayColors: false,
            callbacks: {
              title: items => `${items[0].raw._bar.brand} — ${items[0].raw._bar.flavor}`,
              label: item => {
                const b = item.raw._bar;
                return [`$${b.ppg.toFixed(3)}/g · ${b.proteinDensity.toFixed(1)} g/100 kcal`];
              },
            },
          },
        },
      },
    });
  </script>

</body>
</html>
